name: open_cdp_flutter_sdk
description: A Flutter SDK for integrating with the OpenCDP platform. Track user events, screen views, and device attributes with automatic lifecycle tracking and dual write to Customer.io.
version: 1.0.5
homepage: https://github.com/code-matic/opencdp-flutter-sdk
repository: https://github.com/code-matic/opencdp-flutter-sdk
documentation: https://github.com/code-matic/opencdp-flutter-sdk#readme
issue_tracker: https://github.com/code-matic/opencdp-flutter-sdk/issues

environment:
  sdk: ">=2.19.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.5.3 
  package_info_plus: ^8.3.0 
  device_info_plus: ^11.3.0 
  customer_io: ^2.1.1 

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.2
  build_runner: ^2.4.6
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.opencdp.sdk
        pluginClass: OpenCdpSdkPlugin
      ios:
        pluginClass: OpenCdpSdkPlugin
  uses-material-design: true