name: open_cdp_flutter_sdk
description: A Flutter SDK for integrating with the OpenCDP platform. Track user
  events, screen views, and device attributes with automatic lifecycle tracking
  and dual write to Customer.io.
version: 3.1.3
homepage: https://github.com/code-matic/opencdp-flutter-sdk
repository: https://github.com/code-matic/opencdp-flutter-sdk
documentation: https://github.com/code-matic/opencdp-flutter-sdk#readme
issue_tracker: https://github.com/code-matic/opencdp-flutter-sdk/issues

environment:
  sdk: ^3.6.0
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.5.0
  shared_preferences: ^2.5.3
  package_info_plus: ^9.0.0
  device_info_plus: ^12.2.0
  customer_io: ^3.0.1
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.5.1
  build_runner: ^2.10.1
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.opencdp.sdk
        pluginClass: OpenCdpSdkPlugin
      ios:
        pluginClass: OpenCdpSdkPlugin
